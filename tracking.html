<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GGPoint – Отслеживание заказа</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            min-height: 100vh;
            padding: 24px;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 30%, #1a1f35, #0a0c15);
            z-index: -2;
        }

        .bg-gradient::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.08), transparent);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #60a5fa 50%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: inline-block;
        }

        .tagline {
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .search-card {
            background: rgba(18, 22, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            margin-bottom: 24px;
        }

        .search-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .search-sub {
            color: #7e8aa8;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 16px 20px;
            background: #0f1222;
            border: 1px solid #2d3348;
            border-radius: 60px;
            font-size: 1rem;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .search-btn {
            padding: 0 32px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .order-card {
            background: rgba(18, 22, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            overflow: hidden;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            padding: 24px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tracking-badge {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(37, 99, 235, 0.15);
            padding: 6px 16px;
            border-radius: 40px;
            color: #60a5fa;
        }

        .delivery-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 40px;
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .card-body {
            padding: 28px;
        }

        .current-status {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(37, 99, 235, 0.05));
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
            border-left: 3px solid #f59e0b;
        }

        .status-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .status-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fbbf24;
        }

        .status-date {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 8px;
        }

        .progress-section {
            margin-bottom: 28px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #7e8aa8;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 6px;
            background: #1e2238;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .stages {
            display: flex;
            justify-content: space-between;
            margin: 28px 0;
            position: relative;
        }

        .stages::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #1e2238;
            z-index: 0;
        }

        .stage {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .stage-dot {
            width: 40px;
            height: 40px;
            background: #1e2238;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1rem;
            color: #5b6e8c;
            transition: all 0.3s;
        }

        .stage.active .stage-dot {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #0a0c15;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .stage.completed .stage-dot {
            background: #10b981;
            color: white;
        }

        .stage-name {
            font-size: 0.7rem;
            color: #5b6e8c;
        }

        .stage.active .stage-name {
            color: #fbbf24;
            font-weight: 500;
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .history-item {
            display: flex;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-icon {
            width: 32px;
            height: 32px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            font-size: 0.85rem;
        }

        .history-content {
            flex: 1;
        }

        .history-text {
            font-size: 0.9rem;
            color: #e2e8f0;
            font-weight: 500;
        }

        .history-date {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 4px;
        }

        .history-item.current .history-icon {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .history-item.current .history-text {
            color: #fbbf24;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-row {
            background: rgba(18, 22, 40, 0.5);
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(37, 99, 235, 0.1);
        }

        .order-row:hover {
            border-color: rgba(37, 99, 235, 0.4);
            background: rgba(37, 99, 235, 0.05);
            transform: translateX(4px);
        }

        .order-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .order-code {
            font-family: monospace;
            font-weight: 600;
            color: #60a5fa;
        }

        .order-status-small {
            font-size: 0.7rem;
            color: #fbbf24;
        }

        .order-date {
            font-size: 0.7rem;
            color: #5b6e8c;
        }

        .error-message {
            text-align: center;
            padding: 48px;
            color: #f87171;
            background: rgba(239, 68, 68, 0.05);
            border-radius: 32px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding: 20px;
            font-size: 0.7rem;
            color: #5b6e8c;
        }

        .footer a {
            color: #60a5fa;
            text-decoration: none;
            margin: 0 12px;
        }

        .loader {
            text-align: center;
            padding: 48px;
            color: #7e8aa8;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .search-card { padding: 20px; }
            .card-header, .card-body { padding: 20px; }
            .stages { display: none; }
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <a href="index.html" class="logo">GG<span>Point</span></a>
        <div class="tagline">ТРЕКИНГ ЗАКАЗОВ</div>
    </div>

    <div class="search-card">
        <div class="search-title">Отследить заказ</div>
        <div class="search-sub">Введите трек-номер или номер телефона</div>
        <div class="input-wrapper">
            <input type="text" id="trackingInput" class="search-input" placeholder="Например: GG123456 или +998901234567">
            <button id="trackBtn" class="search-btn"><i class="fas fa-search"></i> Найти</button>
        </div>
    </div>

    <div id="resultContainer"></div>

    <div class="footer">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="contacts.html">Поддержка</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js';
    import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDcyOWAF7TA8h8P36Sk5EbDPzA9sEFuTXo",
        authDomain: "ggpoint-shop.firebaseapp.com",
        databaseURL: "https://ggpoint-shop-default-rtdb.firebaseio.com",
        projectId: "ggpoint-shop",
        storageBucket: "ggpoint-shop.firebasestorage.app",
        messagingSenderId: "182227173652",
        appId: "1:182227173652:web:0949e2edae9900afd98201"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // ========== ЛОГИКА СТАТУСОВ ==========
    // Если отправлен -> считаем дни и показываем график
    // Если не отправлен -> показываем "Планируемая отправка" с датой из админки
    
    function getStatusByDays(order) {
        const today = new Date();
        const sendDate = order.sendDate ? new Date(order.sendDate) : null;
        
        // Проверяем, отправлен ли заказ (есть дата отправки И она не в будущем)
        const isShipped = sendDate && sendDate <= today;
        
        // Если заказ НЕ отправлен (планируется)
        if (!isShipped) {
            // Используем plannedSendDate из админки или fallback
            const plannedDate = order.plannedSendDate ? new Date(order.plannedSendDate) : null;
            const plannedDateFormatted = plannedDate ? plannedDate.toLocaleDateString('ru-RU') : 'в ближайшее время';
            
            return {
                text: `📅 Планируемая отправка: ${plannedDateFormatted}`,
                progress: 0,
                stage: "pending",
                isShipped: false,
                plannedDate: plannedDateFormatted
            };
        }
        
        // Заказ отправлен - считаем дни
        const days = Math.floor((today - sendDate) / (1000 * 60 * 60 * 24));
        const deliveryType = order.deliveryType || 'ground';
        
        // Авиа доставка (быстрая)
        if (deliveryType === 'air') {
            if (days <= 2) return { text: "✈️ Отправлен авиа из Китая", progress: 25, stage: "send", isShipped: true, days: days };
            if (days <= 4) return { text: "🛃 Проходит таможню Узбекистана", progress: 55, stage: "customs", isShipped: true, days: days };
            if (days <= 6) return { text: "📬 Сортировка в Ташкенте", progress: 80, stage: "sorting", isShipped: true, days: days };
            return { text: "✅ Доставлен получателю", progress: 100, stage: "delivered", isShipped: true, days: days };
        }
        
        // Наземная доставка (20 дней)
        if (days <= 1) return { text: "📦 Отправлен из Китая", progress: 5, stage: "send", isShipped: true, days: days };
        if (days <= 5) return { text: "🚛 В пути, направляется в Хоргос", progress: 20, stage: "transit", isShipped: true, days: days };
        if (days <= 7) return { text: "🚛 Прибыл в Хоргос (Казахстан)", progress: 35, stage: "khorgos", isShipped: true, days: days };
        if (days <= 10) return { text: "🛃 Приближается к таможне Узбекистана", progress: 50, stage: "to_customs", isShipped: true, days: days };
        if (days <= 15) return { text: "🛃 Таможенное оформление в Узбекистане", progress: 70, stage: "customs", isShipped: true, days: days };
        if (days <= 18) return { text: "📬 Сортировка в Ташкенте", progress: 85, stage: "sorting", isShipped: true, days: days };
        if (days <= 20) return { text: "🚚 Передан в службу доставки", progress: 95, stage: "delivery", isShipped: true, days: days };
        return { text: "✅ Доставлен получателю", progress: 100, stage: "delivered", isShipped: true, days: days };
    }
    
    // Генерация истории для ОТПРАВЛЕННОГО заказа
    function generateShippedHistory(order, days) {
        const sendDate = new Date(order.sendDate);
        const deliveryType = order.deliveryType || 'ground';
        const history = [];
        
        // Отправка
        history.push({
            date: new Date(sendDate),
            text: "📦 Заказ отправлен из Китая",
            type: "send"
        });
        
        if (deliveryType !== 'air') {
            // Хоргос (день 6)
            if (days >= 6) {
                const date = new Date(sendDate);
                date.setDate(sendDate.getDate() + 6);
                history.push({ date, text: "🚛 Прибыл в Хоргос (Казахстан)", type: "khorgos" });
            }
            // Подход к таможне (день 10)
            if (days >= 10) {
                const date = new Date(sendDate);
                date.setDate(sendDate.getDate() + 10);
                history.push({ date, text: "🛃 Приближается к таможне Узбекистана", type: "approach" });
            }
            // Таможня (день 14)
            if (days >= 14) {
                const date = new Date(sendDate);
                date.setDate(sendDate.getDate() + 14);
                history.push({ date, text: "🛃 Таможенное оформление в Узбекистане", type: "customs" });
            }
            // Сортировка (день 18)
            if (days >= 18) {
                const date = new Date(sendDate);
                date.setDate(sendDate.getDate() + 18);
                history.push({ date, text: "📬 Сортировка в Ташкенте", type: "sorting" });
            }
            // Доставка (день 20)
            if (days >= 20) {
                const date = new Date(sendDate);
                date.setDate(sendDate.getDate() + 20);
                history.push({ date, text: "🚚 Передан в службу доставки", type: "delivery" });
            }
        }
        
        return history.sort((a, b) => b.date - a.date);
    }
    
    // Генерация истории для НЕОТПРАВЛЕННОГО заказа
    function generatePendingHistory(order) {
        const plannedDate = order.plannedSendDate ? new Date(order.plannedSendDate) : null;
        const history = [];
        
        if (plannedDate) {
            history.push({
                date: new Date(),
                text: `📅 Планируемая отправка: ${plannedDate.toLocaleDateString('ru-RU')}`,
                type: "planned",
                isCurrent: true
            });
        } else {
            history.push({
                date: new Date(),
                text: "📅 Заказ оформлен, ожидает отправки",
                type: "planned",
                isCurrent: true
            });
        }
        
        return history;
    }

    function getStageClass(stageName, currentStage) {
        if (stageName === currentStage) return 'active';
        const stages = ['pending', 'send', 'transit', 'khorgos', 'to_customs', 'customs', 'sorting', 'delivery', 'delivered'];
        const currentIndex = stages.indexOf(currentStage);
        const stageIndex = stages.indexOf(stageName);
        if (stageIndex !== -1 && stageIndex < currentIndex) return 'completed';
        return '';
    }

    function renderOrderCard(order) {
        const status = getStatusByDays(order);
        const deliveryName = order.deliveryType === 'air' ? '✈️ Авиадоставка' : '🚛 Наземная доставка';
        
        let history, sendInfo;
        
        if (status.isShipped) {
            // Заказ отправлен
            const sendDate = new Date(order.sendDate);
            const today = new Date();
            const days = Math.floor((today - sendDate) / (1000 * 60 * 60 * 24));
            history = generateShippedHistory(order, days);
            sendInfo = `Отправлен: ${sendDate.toLocaleDateString('ru-RU')}`;
        } else {
            // Заказ не отправлен - планируется
            history = generatePendingHistory(order);
            const plannedDate = order.plannedSendDate ? new Date(order.plannedSendDate).toLocaleDateString('ru-RU') : 'не указана';
            sendInfo = `📅 Планируемая отправка: ${plannedDate}`;
        }
        
        // Иконка для статуса
        let statusIcon = '📦';
        if (status.text.includes('Отправлен')) statusIcon = '📦';
        else if (status.text.includes('Хоргос')) statusIcon = '🚛';
        else if (status.text.includes('Таможня')) statusIcon = '🛃';
        else if (status.text.includes('Сортировка')) statusIcon = '📬';
        else if (status.text.includes('Доставлен')) statusIcon = '✅';
        else if (status.text.includes('Планируемая')) statusIcon = '📅';
        
        return `
            <div class="order-card">
                <div class="card-header">
                    <span class="tracking-badge"><i class="fas fa-hashtag"></i> ${order.tracking}</span>
                    <span class="delivery-badge">${deliveryName}</span>
                </div>
                <div class="card-body">
                    <div class="current-status">
                        <div class="status-icon">${statusIcon}</div>
                        <div class="status-text">${status.text}</div>
                        <div class="status-date">${sendInfo}</div>
                    </div>
                    
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Прогресс доставки</span>
                            <span>${status.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${status.progress}%"></div>
                        </div>
                    </div>
                    
                    <div class="stages">
                        <div class="stage ${getStageClass('send', status.stage)}">
                            <div class="stage-dot"><i class="fas fa-box"></i></div>
                            <div class="stage-name">Отправка</div>
                        </div>
                        <div class="stage ${getStageClass('transit', status.stage)}">
                            <div class="stage-dot"><i class="fas fa-truck"></i></div>
                            <div class="stage-name">Транзит</div>
                        </div>
                        <div class="stage ${getStageClass('customs', status.stage)}">
                            <div class="stage-dot"><i class="fas fa-passport"></i></div>
                            <div class="stage-name">Таможня</div>
                        </div>
                        <div class="stage ${getStageClass('delivery', status.stage)}">
                            <div class="stage-dot"><i class="fas fa-truck-fast"></i></div>
                            <div class="stage-name">Доставка</div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="history-title">
                            <i class="fas fa-clock"></i> История обновлений
                        </div>
                        <div class="history-list">
                            ${history.map(item => `
                                <div class="history-item ${item.isCurrent ? 'current' : ''}">
                                    <div class="history-icon">
                                        <i class="fas ${item.type === 'send' ? 'fa-box' : 
                                                       item.type === 'khorgos' ? 'fa-truck' :
                                                       item.type === 'customs' ? 'fa-passport' :
                                                       item.type === 'sorting' ? 'fa-mail-bulk' :
                                                       item.type === 'delivery' ? 'fa-truck-fast' :
                                                       item.type === 'planned' ? 'fa-calendar' : 'fa-clock'}"></i>
                                    </div>
                                    <div class="history-content">
                                        <div class="history-text">${item.text}</div>
                                        <div class="history-date">${item.date.toLocaleDateString('ru-RU')} в ${item.date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderOrdersList(orders) {
        if (orders.length === 0) {
            return `<div class="error-message"><i class="fas fa-search"></i> Заказы не найдены</div>`;
        }
        
        return `
            <div class="order-card">
                <div class="card-header">
                    <span class="tracking-badge"><i class="fas fa-list"></i> Найдено заказов: ${orders.length}</span>
                </div>
                <div class="card-body">
                    <div class="orders-list">
                        ${orders.map(order => {
                            const status = getStatusByDays(order);
                            const sendInfo = order.sendDate && new Date(order.sendDate) <= new Date() 
                                ? `Отправлен: ${new Date(order.sendDate).toLocaleDateString('ru-RU')}`
                                : (order.plannedSendDate ? `План: ${new Date(order.plannedSendDate).toLocaleDateString('ru-RU')}` : 'Ожидает отправки');
                            return `
                                <div class="order-row" onclick="document.getElementById('trackingInput').value='${order.tracking}'; document.getElementById('trackBtn').click();">
                                    <div class="order-row-top">
                                        <span class="order-code">${order.tracking}</span>
                                        <span class="order-status-small">${status.text.substring(0, 35)}${status.text.length > 35 ? '...' : ''}</span>
                                    </div>
                                    <div class="order-date">
                                        <i class="far fa-calendar"></i> ${sendInfo}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    async function searchByTracking(tracking) {
        const orderRef = ref(database, `tracking_orders/${tracking}`);
        const snapshot = await get(orderRef);
        if (snapshot.exists()) {
            return { type: 'single', order: { tracking, ...snapshot.val() } };
        }
        return null;
    }

    async function searchByPhone(phone) {
        const ordersRef = ref(database, 'tracking_orders');
        const snapshot = await get(ordersRef);
        if (snapshot.exists()) {
            const allOrders = snapshot.val();
            const foundOrders = [];
            for (const [tracking, data] of Object.entries(allOrders)) {
                if (data.phone === phone) {
                    foundOrders.push({ tracking, ...data });
                }
            }
            if (foundOrders.length > 0) return { type: 'list', orders: foundOrders };
        }
        return null;
    }

    async function handleSearch() {
        const input = document.getElementById('trackingInput');
        const query = input.value.trim();
        const container = document.getElementById('resultContainer');
        
        if (!query) {
            container.innerHTML = `<div class="error-message"><i class="fas fa-keyboard"></i> Введите трек-номер или телефон</div>`;
            return;
        }
        
        container.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-spin"></i> Поиск...</div>`;
        
        let result = await searchByTracking(query);
        if (result) {
            container.innerHTML = renderOrderCard(result.order);
            return;
        }
        
        result = await searchByPhone(query);
        if (result) {
            container.innerHTML = renderOrdersList(result.orders);
            return;
        }
        
        container.innerHTML = `<div class="error-message"><i class="fas fa-circle-xmark"></i> Заказ не найден.<br>Проверьте правильность трек-номера или телефона</div>`;
    }

    document.getElementById('trackBtn').addEventListener('click', handleSearch);
    document.getElementById('trackingInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>
</body>
</html>
