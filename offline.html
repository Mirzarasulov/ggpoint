<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения - GGPoint</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .offline-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            border: 1px solid rgba(37, 99, 235, 0.3);
            max-width: 500px;
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        .retry-btn {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">🌐</div>
        <h1 class="text-white">Нет соединения с интернетом</h1>
        <p class="text-secondary">Пожалуйста, проверьте ваше подключение к сети</p>
        <button class="retry-btn" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Попробовать снова
        </button>
        <div class="mt-4">
            <a href="/" class="text-primary">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
