<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор Sitemap для GGPoint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-download {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 2rem;
        }
        .status {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .status.loading {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            color: #60a5fa;
        }
        .status.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2563eb;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 12px;
            overflow: auto;
            max-height: 400px;
            font-size: 0.75rem;
            color: #94a3b8;
            border: 1px solid #334155;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .hidden {
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(37, 99, 235, 0.1);
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .product-list {
            max-height: 200px;
            overflow-y: auto;
            background: #0f172a;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            border: 1px solid #334155;
        }
        .product-item {
            padding: 0.3rem 0;
            border-bottom: 1px solid #1e293b;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .product-item:last-child {
            border-bottom: none;
        }
        .product-item .id {
            color: #2563eb;
            font-weight: 600;
        }
        .product-item .name {
            color: #f1f5f9;
        }
        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .stats { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Генератор Sitemap</h1>
        <p class="subtitle">Автоматически создаст sitemap для всех товаров из Firebase</p>
        
        <button class="btn-primary" id="generateBtn" onclick="generateSitemap()">
            📄 Создать Sitemap
        </button>
        
        <div id="result"></div>
    </div>

    <script>
        // ====== FIREBASE КОНФИГ (из вашего product.html) ======
        const firebaseConfig = {
            apiKey: "AIzaSyDcyOWAF7TA8h8P36Sk5EbDPzA9sEFuTXo",
            authDomain: "ggpoint-shop.firebaseapp.com",
            databaseURL: "https://ggpoint-shop-default-rtdb.firebaseio.com",
            projectId: "ggpoint-shop",
            storageBucket: "ggpoint-shop.firebasestorage.app",
            messagingSenderId: "182227173652",
            appId: "1:182227173652:web:0949e2edae9900afd98201"
        };

        async function generateSitemap() {
            const btn = document.getElementById('generateBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Загрузка товаров...';
            result.innerHTML = '';
            
            try {
                // ====== ЗАГРУЖАЕМ FIREBASE ======
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js');
                const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js');
                
                const app = initializeApp(firebaseConfig);
                const database = getDatabase(app);
                const productsRef = ref(database, 'products');
                
                // ====== ПОЛУЧАЕМ ВСЕ ТОВАРЫ ======
                const snapshot = await get(productsRef);
                const data = snapshot.val();
                
                if (!data) {
                    result.innerHTML = `
                        <div class="status error">
                            ❌ Товары не найдены в Firebase!
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = '📄 Создать Sitemap';
                    return;
                }
                
                // ====== ПРЕОБРАЗУЕМ В МАССИВ ======
                const products = Object.keys(data).map(id => ({
                    id: id,
                    ...data[id]
                }));
                
                // ====== ПОКАЗЫВАЕМ СТАТИСТИКУ ======
                const categories = new Set(products.map(p => p.category).filter(Boolean));
                const hasImages = products.filter(p => p.images && p.images.length > 0).length;
                
                let productsHtml = products.slice(0, 10).map(p => `
                    <div class="product-item">
                        <span class="id">${p.id}</span>
                        <span class="name">${p.name || 'Без названия'}</span>
                    </div>
                `).join('');
                
                if (products.length > 10) {
                    productsHtml += `<div class="product-item" style="color:#64748b;">... и еще ${products.length - 10} товаров</div>`;
                }
                
                // ====== СОЗДАЕМ SITEMAP ======
                const baseUrl = 'https://mirzarasulov.github.io/ggpoint';
                let sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
    <url><loc>${baseUrl}/</loc><priority>1.0</priority></url>
    <url><loc>${baseUrl}/catalog.html</loc><priority>0.9</priority></url>
    <url><loc>${baseUrl}/about.html</loc><priority>0.8</priority></url>
    <url><loc>${baseUrl}/contacts.html</loc><priority>0.8</priority></url>
    <url><loc>${baseUrl}/keycaps.html</loc><priority>0.8</priority></url>
    <url><loc>${baseUrl}/pads.html</loc><priority>0.8</priority></url>
    <url><loc>${baseUrl}/mb.html</loc><priority>0.8</priority></url>`;
                
                let added = 0;
                products.forEach(p => {
                    const id = p.id || p.ID || p._id || p.productId || '';
                    if (id) {
                        sitemap += `
    <url><loc>${baseUrl}/product.html?id=${id}</loc><priority>0.9</priority><changefreq>weekly</changefreq></url>`;
                        added++;
                    }
                });
                
                sitemap += `
</urlset>`;
                
                // ====== СОХРАНЯЕМ ДЛЯ СКАЧИВАНИЯ ======
                window.sitemapContent = sitemap;
                
                // ====== ПОКАЗЫВАЕМ РЕЗУЛЬТАТ ======
                result.innerHTML = `
                    <div class="status success">
                        ✅ Sitemap создан! Найдено ${products.length} товаров
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${products.length}</div>
                            <div class="stat-label">📦 Всего товаров</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color:#10b981;">${added}</div>
                            <div class="stat-label">✅ Добавлено в sitemap</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color:#f59e0b;">${categories.size}</div>
                            <div class="stat-label">📂 Категорий</div>
                        </div>
                    </div>
                    
                    <div style="margin: 1rem 0;">
                        <button class="btn-download" onclick="downloadSitemap()">
                            ⬇️ Скачать sitemap.xml
                        </button>
                    </div>
                    
                    <details>
                        <summary style="color:#94a3b8;cursor:pointer;margin-bottom:0.5rem;">
                            📋 Посмотреть sitemap
                        </summary>
                        <pre>${sitemap}</pre>
                    </details>
                    
                    <details>
                        <summary style="color:#94a3b8;cursor:pointer;margin-top:0.5rem;">
                            📦 Список товаров (первые 10)
                        </summary>
                        <div class="product-list">${productsHtml}</div>
                    </details>
                `;
                
            } catch (error) {
                console.error('Ошибка:', error);
                result.innerHTML = `
                    <div class="status error">
                        ❌ Ошибка: ${error.message}
                        <br><br>
                        <details>
                            <summary style="cursor:pointer;color:#94a3b8;">Подробнее</summary>
                            <pre style="margin-top:0.5rem;">${error.stack}</pre>
                        </details>
                    </div>
                `;
            }
            
            btn.disabled = false;
            btn.innerHTML = '📄 Создать Sitemap';
        }

        function downloadSitemap() {
            if (!window.sitemapContent) return;
            const blob = new Blob([window.sitemapContent], {type: 'application/xml;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'sitemap.xml';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
